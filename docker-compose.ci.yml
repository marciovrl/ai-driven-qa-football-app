services:
  backend:
    build:
      context: ./backend
    environment:
      - CORS_ORIGIN_REGEX=^http://(localhost|frontend):\\d+$
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://backend:3000
    depends_on:
      - backend
    ports:
      - "5173:5173"

  e2e:
    # Must match the resolved @playwright/test version in frontend/package-lock.json
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /work/frontend
    environment:
      - PLAYWRIGHT_USE_DOCKER=true
      - PLAYWRIGHT_BASE_URL=http://frontend:5173
    volumes:
      - ./frontend:/work/frontend
    depends_on:
      - frontend
    command: sh -c "npm ci && npm run test:e2e"
